<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <!-- === IMAGOTIPO FLAT (sin gradientes) — para PDF/EPS === -->

  <!-- ISOTIPO: Pentágono con el 5 -->
  <g transform="translate(150, 150)">
    <polygon points="0,-95 90.3,-29.4 55.8,76.8 -55.8,76.8 -90.3,-29.4"
             fill="#C9A84C" stroke="none"/>
    <polygon points="0,-65 61.8,-20.1 38.2,52.6 -38.2,52.6 -61.8,-20.1"
             fill="#0D0D0D" stroke="none"/>
    <text x="0" y="18" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="62" font-weight="700" fill="#C9A84C" letter-spacing="-2">5</text>
    <circle cx="0" cy="-82" r="5" fill="#D4AF37" opacity="0.9"/>
  </g>

  <!-- LOGOTIPO: Tipografía -->
  <g transform="translate(280, 120)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif"
          font-size="18" font-weight="400" fill="#C9A84C" letter-spacing="8">LA</text>
    <text x="0" y="42" font-family="Georgia, 'Times New Roman', serif"
          font-size="42" font-weight="700" fill="#F0EDE5" letter-spacing="5">QUINTA</text>
    <text x="0" y="80" font-family="Georgia, 'Times New Roman', serif"
          font-size="32" font-weight="400" fill="#C9A84C" letter-spacing="12">ESENCIA</text>
    <line x1="0" y1="95" x2="320" y2="95" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
    <text x="160" y="115" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="10" fill="#9A9AAE" letter-spacing="6">LO ESENCIAL DESTILADO</text>
  </g>
</svg>