<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#B8952A"/>
    </linearGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7B4FB5"/>
      <stop offset="100%" style="stop-color:#5A2D8C"/>
    </linearGradient>
  </defs>

  <!-- === ISOTIPO PURO: Solo símbolo, sin texto === -->
  <!-- Uso: Favicon, ícono de app, redes sociales avatar -->

  <g transform="translate(150, 150)">
    <!-- Anillo exterior sutil -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>

    <!-- Pentágono exterior dorado -->
    <polygon points="0,-110 104.6,-34 64.7,89 -64.7,89 -104.6,-34"
             fill="url(#gold)" stroke="none"/>

    <!-- Pentágono interior negro (crea el borde grueso) -->
    <polygon points="0,-85 80.8,-26.2 49.9,68.7 -49.9,68.7 -80.8,-26.2"
             fill="#0D0D0D" stroke="none"/>

    <!-- Pentagrama interior (estrella de 5 puntas - geometría sagrada) -->
    <polygon points="0,-60 14,-18.5 57.1,-18.5 22.6,7.1 35.3,48.5 0,23 -35.3,48.5 -22.6,7.1 -57.1,-18.5 -14,-18.5"
             fill="url(#violet)" stroke="#C9A84C" stroke-width="0.8" opacity="0.7"/>

    <!-- Número 5 central -->
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="72" font-weight="700" fill="url(#gold)" letter-spacing="-2">5</text>

    <!-- Corona de puntos (5 puntos = 5 elementos) -->
    <circle cx="0" cy="-110" r="4" fill="#D4AF37"/>
    <circle cx="104.6" cy="-34" r="4" fill="#D4AF37"/>
    <circle cx="64.7" cy="89" r="4" fill="#D4AF37"/>
    <circle cx="-64.7" cy="89" r="4" fill="#D4AF37"/>
    <circle cx="-104.6" cy="-34" r="4" fill="#D4AF37"/>
  </g>
</svg>