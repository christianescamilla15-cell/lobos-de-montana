<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Quinta Esencia — Brand System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Montserrat',sans-serif; background:#0A0A0A; color:#F0EDE5; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .container { text-align:center; padding:60px 20px; }
        .sub { font-size:0.65rem; color:#6C3FA0; letter-spacing:6px; text-transform:uppercase; font-weight:600; margin-bottom:14px; }
        h1 { font-family:'Playfair Display',serif; font-size:3rem; color:#C9A84C; letter-spacing:8px; font-weight:400; margin-bottom:8px; }
        .tagline { color:#9A9AAE; font-size:0.8rem; letter-spacing:4px; margin-bottom:50px; }
        .links { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; }
        .link-card { background:#1A1A2E; border:1px solid rgba(201,168,76,0.12); border-radius:16px; padding:30px 36px; text-decoration:none; transition:all 0.3s ease; min-width:220px; }
        .link-card:hover { transform:translateY(-6px); border-color:#C9A84C; box-shadow:0 16px 40px rgba(201,168,76,0.1); }
        .link-card .icon { font-size:2rem; margin-bottom:12px; }
        .link-card h3 { font-family:'Playfair Display',serif; color:#C9A84C; font-size:1rem; letter-spacing:2px; margin-bottom:6px; }
        .link-card p { color:#9A9AAE; font-size:0.7rem; letter-spacing:1px; }
        .footer { position:fixed; bottom:20px; font-size:0.6rem; color:#333; letter-spacing:4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sub">Sistema de identidad visual</div>
        <h1>La Quinta Esencia</h1>
        <p class="tagline">LO ESENCIAL DESTILADO</p>
        <div class="links">
            <a href="paleta.html" class="link-card">
                <div class="icon">&#9672;</div>
                <h3>Paleta de Colores</h3>
                <p>Colores, gradientes, tipograf&iacute;a y c&oacute;digo CSS</p>
            </a>
            <a href="preview.html" class="link-card">
                <div class="icon">&#9733;</div>
                <h3>Logos & Manual</h3>
                <p>Imagotipo, isotipo, monograma y terminolog&iacute;a</p>
            </a>
        </div>
    </div>
    <div class="footer">AGENTE LOGOMAKER &mdash; 2026</div>
</body>
</html>
